<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users – InvenTrack</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">Users</h2>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('addModal')">+ Add User</button>
      </div>
    </div>
    <div class="content">
      <div id="not-admin" style="display:none" class="alert alert-error">Admin access required to manage users.</div>
      <div class="card">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Created</th><th>Action</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>Add New User</h3>
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input id="f-name" placeholder="John Doe"></div>
        <div class="form-group"><label>Email *</label><input id="f-email" type="email" placeholder="john@company.com"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password *</label><input id="f-pass" type="password" placeholder="Min 6 characters"></div>
        <div class="form-group"><label>Role</label>
          <select id="f-role">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Create User</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function init() {
      await renderLayout('Users', '/users');
      if (window._me.role !== 'admin') { document.getElementById('not-admin').style.display='block'; return; }
      const users = await fetch('/api/users').then(r => r.json());
      const tb = document.getElementById('tbl');
      if (!users.length) { tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">No users found.</td></tr>'; return; }
      tb.innerHTML = users.map((u, i) => `
        <tr>
          <td style="color:var(--text-muted)">${i+1}</td>
          <td style="font-weight:600">${u.name}</td>
          <td style="color:var(--text-muted)">${u.email}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td style="font-size:12px;color:var(--text-muted)">${formatDate(u.created_at)}</td>
          <td>${u.id !== window._me.id ? `<button class="btn btn-danger btn-sm" onclick="del(${u.id})">🗑️</button>` : '<span style="color:var(--text-muted);font-size:12px">You</span>'}</td>
        </tr>`).join('');
    }
    async function save() {
      const body = { name: document.getElementById('f-name').value.trim(), email: document.getElementById('f-email').value, password: document.getElementById('f-pass').value, role: document.getElementById('f-role').value };
      if (!body.name || !body.email || !body.password) return alert('All fields are required!');
      if (body.password.length < 6) return alert('Password must be at least 6 characters!');
      const res = await fetch('/api/users', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.success) { closeModal('addModal'); init(); }
      else alert(data.message);
    }
    async function del(id) {
      if (!confirm('Delete this user?')) return;
      const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) init(); else alert(data.message);
    }
    document.getElementById('addModal').addEventListener('click', e => { if (e.target === document.getElementById('addModal')) closeModal('addModal'); });
    init();
  </script>
</body>
</html>
