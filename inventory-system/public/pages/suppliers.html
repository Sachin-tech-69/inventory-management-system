<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suppliers – InvenTrack</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar" class="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">Suppliers</h2>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('addModal')">+ Add Supplier</button>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <table>
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Action</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>Add Supplier</h3>
      <div class="form-group"><label>Supplier Name *</label><input id="f-name" placeholder="e.g. ABC Trading Co."></div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input id="f-email" type="email" placeholder="contact@abc.com"></div>
        <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="+91 98765 43210"></div>
      </div>
      <div class="form-group"><label>Address</label><textarea id="f-address" rows="2" placeholder="Full address..."></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn btn-primary" onclick="save()">Add Supplier</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function init() {
      await renderLayout('Suppliers', '/suppliers');
      const suppliers = await fetch('/api/suppliers').then(r => r.json());
      const tb = document.getElementById('tbl');
      if (!suppliers.length) { tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:40px">No suppliers yet.</td></tr>'; return; }
      tb.innerHTML = suppliers.map((s, i) => `
        <tr>
          <td style="color:var(--text-muted)">${i+1}</td>
          <td style="font-weight:600">${s.name}</td>
          <td style="color:var(--text-muted)">${s.email || '—'}</td>
          <td>${s.phone || '—'}</td>
          <td style="color:var(--text-muted);font-size:12px">${s.address || '—'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="del(${s.id})">🗑️</button></td>
        </tr>`).join('');
    }
    async function save() {
      const body = { name: document.getElementById('f-name').value.trim(), email: document.getElementById('f-email').value, phone: document.getElementById('f-phone').value, address: document.getElementById('f-address').value };
      if (!body.name) return alert('Supplier name is required!');
      const res = await fetch('/api/suppliers', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (data.success) { closeModal('addModal'); init(); }
      else alert(data.message);
    }
    async function del(id) {
      if (!confirm('Delete this supplier?')) return;
      await fetch(`/api/suppliers/${id}`, { method: 'DELETE' });
      init();
    }
    document.getElementById('addModal').addEventListener('click', e => { if (e.target === document.getElementById('addModal')) closeModal('addModal'); });
    init();
  </script>
</body>
</html>
